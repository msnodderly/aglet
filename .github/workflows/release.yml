name: Build and release aglet

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aglet-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest      # linux x86_64
          - ubuntu-24.04-arm   # linux aarch64
          - macos-13           # macOS x86_64 (Intel)
          - macos-latest       # macOS aarch64 (Apple Silicon)
          - windows-latest     # windows x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build output
        uses: Swatinem/rust-cache@v2

      - name: Build standalone package
        shell: bash
        run: scripts/build-standalone-aglet.sh --out-dir dist

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: aglet-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  nightly:
    name: Publish continuous prerelease
    needs: package
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Move continuous release tag
        run: |
          git tag --force aglet-latest "$GITHUB_SHA"
          git push --force origin aglet-latest

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: aglet-latest
          name: Latest aglet binary
          body: |
            Standalone aglet binaries built from the latest merged pull request.

            Commit: ${{ github.sha }}
          prerelease: true
          make_latest: false
          files: release-assets/*

  release:
    name: Publish versioned release
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and verify version
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' crates/aglet-cli/Cargo.toml | head -1)"
          if [ "$tag" != "$cargo_version" ]; then
            echo "::error::Tag v$tag does not match aglet-cli Cargo.toml version $cargo_version. Bump the crate version to match before tagging."
            exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"

      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: aglet ${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: release-assets/*

  update-tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate Homebrew formula
        run: |
          scripts/generate-homebrew-formula.sh \
            --version "${{ needs.release.outputs.version }}" \
            --dist release-assets \
            --out aglet.rb
          echo "--- generated formula ---"
          cat aglet.rb

      - name: Push formula to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set. Add a PAT with write access to msnodderly/homebrew-tap."
            exit 1
          fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/msnodderly/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp aglet.rb tap/Formula/aglet.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/aglet.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date; nothing to commit."
            exit 0
          fi
          git commit -m "aglet ${VERSION}"
          git push
