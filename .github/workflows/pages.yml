name: Deploy manual to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/index.htm'
      - 'docs/aglet-manual.htm'
      - 'docs/aglet-tui.htm'
      - 'docs/aglet-cli.htm'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site
        run: |
          mkdir -p _site
          cp docs/index.htm        _site/index.html
          cp docs/aglet-manual.htm _site/aglet-manual.htm
          cp docs/aglet-tui.htm    _site/aglet-tui.htm
          cp docs/aglet-cli.htm    _site/aglet-cli.htm
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
