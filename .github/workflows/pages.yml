name: Deploy manual to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/src/**'
      - 'docs/images/**'
      - 'docs/templates/**'
      - 'docs/Makefile'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pandoc (pinned) + TeX (xelatex) + fonts
        run: |
          PANDOC_VERSION=3.6.4
          curl -fsSL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb" -o /tmp/pandoc.deb
          sudo dpkg -i /tmp/pandoc.deb
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra \
            lmodern fonts-ibm-plex
      - name: Build manual (HTML + Markdown + typeset PDF)
        # Local authoring uses Palatino; CI substitutes a TeX Live equivalent.
        run: |
          make -C docs all \
            MAINFONT="TeX Gyre Pagella" \
            MONOFONT="IBM Plex Mono"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site
      - id: deployment
        uses: actions/deploy-pages@v4
