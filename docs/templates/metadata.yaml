---
title: "Aglet Manual"
subtitle: "Concepts · TUI Guide · CLI Reference"
# no author line; date is injected by the Makefile (build date)

# --- Page + type ---
documentclass: report          # report → \chapter per top-level division
papersize: letter
geometry:
  - margin=1in
fontsize: 11pt
linestretch: 1.15

# Fonts (xelatex). Body serif + monospace for code/keybindings.
mainfont: "Palatino"
monofont: "IBM Plex Mono"
mainfontoptions:
  - Numbers=OldStyle

# --- Structure ---
toc: true
toc-depth: 2
numbersections: true
top-level-division: chapter
colorlinks: true
linkcolor: "RoyalBlue"
urlcolor: "RoyalBlue"
toccolor: "black"
# Running headers + booktabs are in templates/header.tex (raw LaTeX, included
# via --include-in-header in the Makefile so pandoc doesn't reparse it).
---
